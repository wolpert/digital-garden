name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      # Full build of every module: compiles core + desktop + android, runs the
      # test task and Android lint, and assembles the APKs. Matches a local
      # `./gradlew build`. The android module reads ANDROID_HOME (from
      # setup-android) in place of the git-ignored local.properties.
      - name: Build & test
        run: ./gradlew build --no-daemon --stacktrace

version: 2
updates:
  # Gradle dependencies across every module (root + core + lwjgl3 + android).
  - package-ecosystem: "gradle"
    directories:
      - "/"
      - "/core"
      - "/lwjgl3"
      - "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Keep the GitHub Actions used by the workflows up to date too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
